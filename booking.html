<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الحجز - Loving Homes</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #f0f4ff; color: #222; }
    nav { background: #1a2e6b; padding: 16px 32px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .logo { color: white; font-size: 1.3rem; font-weight: 700; }
    .nav-links { display: flex; gap: 12px; flex-wrap: wrap; }
    nav a { color: white; text-decoration: none; border: 1px solid white; padding: 7px 18px; border-radius: 20px; font-size: 0.85rem; transition: background 0.2s; }
    nav a:hover { background: rgba(255,255,255,0.15); }
    .hero { text-align: center; padding: 50px 20px 30px; }
    .hero h2 { font-size: 2rem; color: #1a2e6b; margin-bottom: 8px; }
    .hero p { color: #666; }
    .form-box { background: white; border-radius: 14px; padding: 36px; max-width: 600px; margin: 30px auto 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); border-top: 4px solid #1a2e6b; }
    .form-box h3 { color: #1a2e6b; margin-bottom: 24px; font-size: 1.1rem; }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 5px; }
    .form-box input, .form-box select {
      width: 100%; padding: 10px 14px; margin-bottom: 16px;
      border: 1px solid #ddd; border-radius: 10px;
      font-family: 'Cairo', sans-serif; font-size: 0.9rem; outline: none;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-box button { background: #1a2e6b; color: white; border: none; padding: 12px 30px; border-radius: 20px; font-family: 'Cairo', sans-serif; font-size: 0.95rem; cursor: pointer; width: 100%; margin-top: 6px; }
    .form-box button:hover { background: #243d8f; }
    footer { background: #1a2e6b; color: rgba(255,255,255,0.6); text-align: center; padding: 20px; font-size: 0.85rem; }
    @media(max-width: 500px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <nav>
    <div class="logo">Loving Homes</div>
        <div class="nav-links">
      <a href="index.html">الرئيسية</a>
      <a href="blog.html">المدونة</a>
      <a href="about.html">من نحن</a>
      <a href="contact.html">اتصل بنا</a>
      <a href="services.html">الخدمات</a>
      <a href="packages.html">الحزم</a>
      <a href="booking.html">الحجز</a>
      <a href="faq.html">الأسئلة الشائعة</a>
      <a href="gallery.html">معرض الصور</a>
    </div>
  </nav>
  <div class="hero">
    <h2>احجز الآن</h2>
    <p>احجز مكاناً لكلبك بكل سهولة</p>
  </div>
  <div class="form-box">
    <h3>بيانات الحجز</h3>
    <label>اسم صاحب الكلب</label>
    <input type="text" placeholder="الاسم الكامل">
    <label>رقم الهاتف</label>
    <input type="tel" placeholder="+962 ...">
    <label>اسم الكلب</label>
    <input type="text" placeholder="اسم كلبك">
    <label>نوع الخدمة</label>
    <select>
      <option>اختر الخدمة</option>
      <option>الإقامة والفندقة</option>
      <option>الاستحمام والتنظيف</option>
      <option>الحلاقة والتزيين</option>
      <option>التدريب</option>
    </select>
    <div class="row">
      <div>
        <label>تاريخ الوصول</label>
        <input type="date">
      </div>
      <div>
        <label>تاريخ المغادرة</label>
        <input type="date">
      </div>
    </div>
    <button>تأكيد الحجز</button>
  </div>
  <footer><p>&copy; 2025 Loving Homes — جميع الحقوق محفوظة</p></footer>
</body>
</html>
